<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Palette Pro Studio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="src/styles/tailwind.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
      integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="src/styles/app.css" />
  </head>
  <body>
    <header>
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end gap-4"
      >
        <div>
          <h1 class="text-4xl md:text-5xl flex items-baseline">
            <span class="logo-font">PALETTE</span>
            <span
              class="text-lg md:text-xl font-normal not-italic ml-3 text-gray-400"
              >Match &amp; Export</span
            >
          </h1>
          <p
            class="text-gray-400 mt-2 md:mt-3 text-[11px] md:text-sm font-medium leading-tight"
          >
            1. Pick a base color → 2. Add matching colors → 3. Download your
            palette
          </p>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
          <button
            type="button"
            id="resetBtn"
            class="flex-1 md:flex-none px-4 py-2 border border-gray-300 text-[10px] font-black uppercase"
          >
            Reset
          </button>
          <button
            type="button"
            id="downloadBtn"
            disabled
            class="flex-1 md:flex-none px-6 py-2 bg-black text-white text-[10px] font-black uppercase tracking-widest"
          >
            Download PNG
          </button>
        </div>
      </div>
    </header>

    <main>
      <div id="sourceGrid"></div>
    </main>

    <div id="paletteDrawer" class="p-4 md:p-6">
      <button
        type="button"
        id="toggleBtn"
        aria-expanded="true"
        aria-controls="userPalette"
        aria-label="Collapse palette"
      >
        <span id="arrow" class="text-[10px] font-bold">&#x2228;</span>
      </button>
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-4">
          <h3
            class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400"
          >
            Your Palette (<span id="count" aria-live="polite">0</span>/<span
              id="maxCount"
            ></span
            >)
          </h3>
        </div>
        <div id="userPalette"></div>
      </div>
    </div>

    <script type="module" src="src/scripts/app.mjs"></script>
  </body>
</html>
